<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — Africa Code Academy</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-container">
        <a href="/home.html" class="navbar-logo">
          <span class="logo-icon">&lt;/&gt;</span>
          <span class="logo-text">Africa Code Academy</span>
        </a>
      </div>
    </nav>

    <main style="padding:2rem;">
      <div style="width:min(1000px,calc(100% - 2rem));margin:0 auto;">
        <h1>Contact</h1>
        <p>For enquiries, please email <a href="mailto:info@africacodeacademy.org">info@africacodeacademy.org</a> or call <a href="tel:+26656171110">+266 5617 1110</a>.</p>
        <form style="display:flex;flex-direction:column;gap:0.5rem;max-width:480px;">
          <input type="text" placeholder="Your name" required />
          <input type="email" placeholder="Your email" required />
          <textarea placeholder="Message" rows="6"></textarea>
          <button class="btn btn-primary">Send</button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-container">
        <div style="text-align:center;padding:1rem 0;color:var(--text-light);">Created by Sechaba Seabata • +266 5617 1110</div>
      </div>
    </footer>
  </body>
</html>
